<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Mulivelivek 初鹿部落｜所有商品</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root { --bg: #f7f3ec; --bg-soft: #fffdf8; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --accent-dark: #92572a; --text: #2f2415; --muted: #7b6d5c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* 與首頁統一的 Header 風格 */
   /* 導覽列通用樣式 */
.site-header { position: sticky; top: 0; z-index: 50; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff; }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); background: radial-gradient(circle at 30% 20%, #f8e1b4, #c98c46); }
.brand-text-main { font-size: 1.1rem; font-weight: 600; color: #fff; }
.brand-text-sub { font-size: 0.75rem; color: #f5e3bf; letter-spacing: 0.1em; text-transform: uppercase; }
.header-nav { display: flex; gap: 20px; font-size: 0.9rem; font-weight: 500; }
.header-nav a { color: #fff; text-decoration: none; }
.header-nav a:hover { color: #f5e3bf; }
.header-cart-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(0,0,0,0.4); font-size: 0.85rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; color: #fff; }
.header-cart-pill:hover { background: rgba(0,0,0,0.6); }
.header-cart-count { min-width: 20px; height: 20px; border-radius: 999px; background: #c58543; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }

@media (max-width: 768px) {
  .header-inner { padding: 10px 16px; }
  .brand { flex: 1; }
  .header-nav { order: 3; width: 100%; justify-content: center; margin-top: 12px; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; }
  .header-cart-pill { margin-left: auto; }
}
    /* Page */
    .page { flex: 1; max-width: 1100px; margin: 0 auto; padding: 40px 16px; width: 100%; }
    .page-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 24px; color: var(--accent-dark); text-align: center; }
    
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 900px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .product-grid { grid-template-columns: 1fr; gap: 16px; } }

    .product-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    
    .product-thumb { position: relative; padding-top: 100%; background: #e5ded1; overflow: hidden; }
    .product-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    
    .product-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .product-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; line-height: 1.4; }
    .product-price { color: var(--accent-dark); font-weight: 700; font-size: 1.1rem; margin-top: auto; }
    .btn-buy { display: block; text-align: center; margin-top: 16px; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; font-weight: 600; color: var(--muted); transition: 0.2s; }
    .product-card:hover .btn-buy { background: var(--accent); color: #fff; border-color: var(--accent); }

    .site-footer { border-top: 1px solid var(--border); padding: 30px 16px; background: #fffdf8; text-align: center; font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" style="display:flex; align-items:center; gap:10px;">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-text-main">Mulivelivek 初鹿部落</div>
            <div class="brand-text-sub">'inavayan</div>
          </div>
        </a>
      </div>
      <nav class="header-nav">
        <a href="index.html">首頁</a>
        <a href="products.html" class="active">所有商品</a>
        <a href="gallery.html">部落相簿</a>
        <a href="order-tracking.html">訂單查詢</a>
      </nav>
      <a href="cart.html" class="header-cart-pill">
        購物車 <span class="header-cart-count" id="headerCartCount">0</span>
      </a>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">所有商品</h1>
    <div class="product-grid">
      <!-- 商品 1 -->
      <a href="product-long-sleeve.html" class="product-card">
        <div class="product-thumb">
          <!-- 💡 這裡放真實圖片路徑，若檔案在同資料夾可直接寫檔名 -->
          <img src="assets/pic/S__110592122.jpg" alt="年祭限定水洗長袖" class="product-img" onerror="this.onerror=null;this.src='https://placehold.co/600x600?text=Product+Image'">
        </div>
        <div class="product-body">
          <div class="product-name">初鹿部落收穫祭限定提袋</div>
          <div class="product-price">NT$ 200</div>
          <span class="btn-buy">立即購買</span>
        </div>
      </a>
      
      <!-- 佔位商品 2 -->
      <div class="product-card" style="opacity:0.6;">
        <div class="product-thumb"><div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">Coming Soon</div></div>
        <div class="product-body">
          <div class="product-name">敬請期待</div>
          <div class="product-price">-</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div>© 2025 Mulivelivek 初鹿部落</div>
  </footer>
  
<script>
    // 統一讀取與 Header 更新邏輯
    const CART_KEY = 'mulivelivek_cart';
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
      const count = cart.reduce((s, i) => s + (parseInt(i.qty) || 0), 0);
      document.getElementById('headerCartCount').textContent = count;
    }
    updateCartCount();
  </script>
</body>
</html>
