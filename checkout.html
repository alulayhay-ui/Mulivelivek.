<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>結帳｜Mulivelivek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --bg:#f7f3ec;
      --card:#ffffff;
      --border:#e3ddcf;
      --text:#2f2415;
      --muted:#7b6d5a;
      --black:#000;
    }
    *{box-sizing:border-box;}
    html,body{
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    body{min-height:100vh;}

    /* 左上按鈕 */
    .top-buttons{
      position:fixed;
      top:16px;
      left:16px;
      display:flex;
      flex-direction:column;
      gap:8px;
      z-index:300;
    }
    .top-btn{
      padding:6px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#fff;
      color:#333;
      font-size:13px;
      text-decoration:none;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
      cursor:pointer;
      transition:.15s;
      text-align:left;
    }
    .top-btn:hover{
      border-color:#000;
      color:#000;
    }

    .wrap{
      max-width:520px;
      margin:56px auto 40px;
      padding:0 16px;
    }
    h1{font-size:22px;margin-bottom:10px;}
    .step-card{
      background:#fff;
      border-radius:18px;
      padding:18px 16px 20px;
      border:1px solid #e3ddcf;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .step-title{font-size:16px;font-weight:600;margin-bottom:8px;}
    .step-desc{font-size:13px;color:#7b6d5a;margin-bottom:14px;}
    label{display:block;font-size:13px;margin:8px 0 4px;}
    input{
      width:100%;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid #d0c8b7;
      font-size:14px;
      box-sizing:border-box;
    }
    .btn-row{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-top:18px;
    }
    .btn{
      flex:1;
      padding:9px 12px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:14px;
    }
    .btn-primary{
      background:#000;
      color:#fff;
    }
    .btn-ghost{
      background:transparent;
      border:1px solid #d0c8b7;
      color:#7b6d5a;
    }
    .remit-box{
      background:#f7f3ec;
      border-radius:12px;
      padding:12px;
      font-size:13px;
      margin:12px 0 6px;
    }
    .remit-box strong{display:block;margin-bottom:4px;}
    .step-indicator{
      font-size:12px;
      color:#7b6d5a;
      margin-bottom:8px;
    }
    .success-text{
      font-size:14px;
      line-height:1.7;
      text-align:center;
      padding:20px 6px 10px;
    }

    /* 訂單摘要卡片 */
    .summary-card{
      background:#f7f3ec;
      border-radius:14px;
      padding:10px 12px 12px;
      margin:-4px 0 14px;
      font-size:13px;
    }
    .summary-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:6px;
      font-weight:600;
    }
    .summary-items{
      border-top:1px solid #e3ddcf;
      border-bottom:1px solid #e3ddcf;
      padding:8px 0 6px;
      margin-bottom:8px;
    }
    .summary-item{
      display:flex;
      align-items:flex-start;
      gap:8px;
      margin-bottom:6px;
    }
    .summary-thumb{
      width:40px;
      height:40px;
      border-radius:8px;
      background:#fff;
      overflow:hidden;
      flex-shrink:0;
    }
    .summary-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .summary-main{
      flex:1;
    }
    .summary-name{
      font-size:13px;
      margin-bottom:2px;
    }
    .summary-meta{
      font-size:12px;
      color:#7b6d5a;
    }
    .summary-price{
      font-size:13px;
      white-space:nowrap;
      margin-left:6px;
    }
    .summary-qty-dot{
      width:18px;
      height:18px;
      border-radius:999px;
      background:#2f2415;
      color:#fff;
      font-size:11px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-right:2px;
    }
    .summary-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
      margin-top:2px;
    }
    .summary-total-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:4px;
      font-size:16px;
      font-weight:700;
    }

    /* 右下浮動購物車按鈕 */
    .floating-cart{
      position:fixed;
      right:16px;
      bottom:16px;
      padding:10px 16px;
      border-radius:999px;
      background:#000;
      color:#fff;
      font-size:13px;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:6px;
      box-shadow:0 8px 18px rgba(0,0,0,.25);
      z-index:250;
    }

    /* Loading 蒙版 */
    #loading-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:500;
    }
    .loading-box{
      background:#fff;
      padding:18px 20px;
      border-radius:16px;
      text-align:center;
      font-size:14px;
      color:#333;
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }
    .spinner{
      width:32px;
      height:32px;
      border-radius:50%;
      border:3px solid #e3e3e3;
      border-top-color:#000;
      margin:0 auto 10px;
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:768px){
      .wrap{margin-top:64px;}
    }

    /* 匯款確認彈窗 */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s ease, visibility .25s ease;
    }
    .modal-overlay.is-open{
      opacity: 1;
      visibility: visible;
    }
    .modal-box{
      width: 90%;
      max-width: 360px;
      background: #fff;
      padding: 20px 22px 24px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      text-align: center;
      transform: scale(.9) translateY(10px);
      opacity: 0;
      transition:
        transform .25s cubic-bezier(.16,.75,.33,1.2),
        opacity .25s ease;
    }
    .modal-overlay.is-open .modal-box{
      transform: scale(1) translateY(0);
      opacity: 1;
    }
    .modal-title{
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .modal-remit-info{
      background: #f7f3ec;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.6;
      color: #2f2415;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .modal-buttons{
      display: flex;
      gap: 10px;
    }
    .modal-btn{
      flex: 1;
      padding: 10px 0;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    .modal-btn.primary{
      background: #000;
      color: #fff;
    }
    .modal-btn.ghost{
      background: transparent;
      border: 1px solid #d0c8b7;
      color: #7b6d5a;
    }
  </style>
</head>
<body>

  <!-- 左上：回首頁  -->
  <div class="top-buttons">
    <a href="index.html" class="top-btn">← 回到首頁</a>
  </div>

  <!-- 右下：回購物車 -->
  <a href="cart.html" class="floating-cart">🛒 回到購物車</a>

  <!-- Loading 蒙版 -->
  <div id="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loading-text">處理中，請稍候…</div>
    </div>
  </div>

  <div class="wrap">
    <h1>結帳</h1>
    <div id="step-indicator" class="step-indicator">Step 1 / 2</div>
    <div class="step-card" id="step-card"></div>
  </div>

  <!-- 匯款確認彈窗 -->
  <div id="confirm-remit-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">請確認是否已完成匯款</div>
      <div class="modal-remit-info">
        💰 <strong>匯款資訊</strong><br>
        初鹿青年會帳戶<br>
        銀行代碼：823（將來銀行）<br>
        帳號：88680977418900<br>
        <span style="font-size:13px; color:#7b6d5a;">（有族人想贊助也是匯這裡~~）</span>
      </div>
      <div class="modal-buttons">
        <button id="modal-no" class="modal-btn ghost">尚未匯款</button>
        <button id="modal-yes" class="modal-btn primary">已匯款</button>
      </div>
    </div>
  </div>

<script>
  const CART_KEY   = 'mulivelivek_cart';
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxQeUbjn2Rf4VPw3IeHUkw1pKUFJgsM13cFT1h7KGEu_DnzK9Dx01Oh7_zB8rZN4eCH/exec';

  // 匯款截圖狀態
  let hasScreenshot = false;
  let screenshotFileName = '';
  let remitImageBase64 = '';

  function getCart() {
    const raw = localStorage.getItem(CART_KEY);
    return raw ? JSON.parse(raw) : [];
  }
  function clearCart() {
    localStorage.removeItem(CART_KEY);
  }

  // 彈窗開關
  function openConfirmModal() {
    document.getElementById("confirm-remit-modal").classList.add("is-open");
  }
  function closeConfirmModal() {
    document.getElementById("confirm-remit-modal").classList.remove("is-open");
  }

  // 組訂單資料（會一起帶匯款截圖）
function buildOrderData(pickupMethod) {
  const cart = getCart();

  // 將購物車內容轉為一個文字字串，存入「款式」欄位
  const itemsString = cart
    .map(i => `${i.name || '商品'} (尺寸:${i.size || '無'}, 數量:${i.qty || 1})`)
    .join('；');

  return {
    name:         sessionStorage.getItem('mulive_name') || '',
    phone:        sessionStorage.getItem('mulive_phone') || '',
    last5:        sessionStorage.getItem('mulive_last5') || '',
    items:        itemsString, // 這就是您的「款式」欄位
    pickupMethod: pickupMethod || '',
    note:         sessionStorage.getItem('mulive_note') || ''
  };
}
// ✅ 這一段直接覆蓋你現在的 sendOrderToSheet

async function sendOrderToSheet(orderData) {
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',            // ⬅️ 避免 CORS / preflight
      body: JSON.stringify(orderData)
      // ❌ 不要加 headers: { 'Content-Type': ... }，不然又會 preflight
    });

    // no-cors 的回應會是 opaque，看不到內容，但沒關係，我們只要送出去
    console.log('送出到試算表完成，response type =', res.type);
  } catch (err) {
    console.error('送出到試算表失敗（網路層）', err);
  }
}

  let currentStep = 1;
  const TOTAL_STEPS = 2;
  const stepCard = document.getElementById('step-card');
  const stepIndicator = document.getElementById('step-indicator');
  const loadingOverlay = document.getElementById('loading-overlay');
  const loadingText = document.getElementById('loading-text');

  function showLoading(text){
    loadingText.textContent = text || '處理中，請稍候…';
    loadingOverlay.style.display = 'flex';
  }
  function hideLoading(){
    loadingOverlay.style.display = 'none';
  }

  if (!getCart().length) {
    alert('購物車是空的，請先選購商品。');
    window.location.href = 'product.html';
  }

  // 訂單摘要
  function renderOrderSummary(){
    const card = document.getElementById('summary-card');
    if (!card) return;

    const cart = getCart();
    let total = 0;
    let itemsHtml = '';

    cart.forEach((item) => {
      const subtotal = (item.price || 0) * (item.qty || 0);
      total += subtotal;
      itemsHtml += `
        <div class="summary-item">
          <div class="summary-thumb">
            <img src="assets/pic/S__110592122.jpg" alt="商品預覽">
          </div>
          <div class="summary-main">
            <div class="summary-name">${item.name || ''}</div>
            <div class="summary-meta">${item.size || ''}，${item.color || ''}</div>
          </div>
          <div class="summary-price">NT$ ${subtotal}</div>
        </div>
      `;
    });

    card.innerHTML = `
      <div class="summary-header">
        <span>訂單摘要</span>
      </div>
      <div class="summary-items">
        ${itemsHtml}
      </div>
      <div class="summary-line">
        <span>合計</span>
        <span>NT$ ${total}</span>
      </div>
      <div class="summary-total-line">
        <span>總金額</span>
        <span>NT$ ${total}</span>
      </div>
    `;
  }

  function renderStep() {
    if (currentStep <= TOTAL_STEPS) {
      stepIndicator.textContent = `Step ${currentStep} / ${TOTAL_STEPS}`;
    }

    // Step1
    if (currentStep === 1) {
      stepCard.innerHTML = `
        <div id="summary-card" class="summary-card"></div>

        <div class="step-title">訂購人資訊 & 匯款資料</div>
        <div class="step-desc">
          請確認下方訂單內容，並填寫你的姓名、電話與匯款帳號後五碼，方便我們聯絡與對帳。
        </div>

        <label for="name">姓名</label>
        <input id="name" type="text" placeholder="例：鄭彥軍" />

        <label for="phone">電話</label>
        <input id="phone" type="tel" placeholder="例：0910-558-302" />

        <div class="remit-box">
          <strong>💰 匯款資訊</strong>
          初鹿青年會帳戶<br/>
          銀行代碼：823（將來銀行）<br/>
          帳號：88680977418900<br/>
          <span style="display:block;margin-top:6px;">（有族人想贊助也是匯這裡~~）</span>
        </div>

        <label for="last5">匯款帳號後五碼</label>
        <input id="last5" type="text" maxlength="5" placeholder="例：12345" />

        <label for="remit-image">匯款截圖（選擇相簿照片）</label>
        <input id="remit-image" type="file" accept="image/*" />

        <div id="remit-image-preview-wrap" style="margin-top:8px; display:none;">
          <span style="font-size:12px;color:#7b6d5a;">預覽：</span>
          <img id="remit-image-preview"
               style="display:block;max-width:100%;border-radius:8px;margin-top:4px;" />
        </div>

        <label for="note">想對我們說的話（選填）</label>
        <textarea id="note" rows="3"
          placeholder="例：我愛初鹿部落、辛苦了。你們的鼓勵是我們最大的動力"
          style="width:100%;padding:10px;border-radius:10px;border:1px solid #d0c8b7;font-size:14px;resize:none;"></textarea>

        <div class="btn-row">
          <button class="btn btn-ghost" onclick="window.location.href='cart.html'">← 返回購物車</button>
          <button class="btn btn-primary" id="next-1">下一步</button>
        </div>
      `;

      renderOrderSummary();

      // 匯款截圖監聽
      const remitInput = document.getElementById('remit-image');
      const previewWrap = document.getElementById('remit-image-preview-wrap');
      const previewImg  = document.getElementById('remit-image-preview');

      hasScreenshot = false;
      screenshotFileName = '';
      remitImageBase64 = '';
      sessionStorage.removeItem('mulive_screenshot_name');

      if (remitInput) {
        remitInput.addEventListener('change', () => {
          const file = remitInput.files && remitInput.files[0];
          if (!file) {
            hasScreenshot = false;
            screenshotFileName = '';
            remitImageBase64 = '';
            sessionStorage.removeItem('mulive_screenshot_name');
            if (previewWrap && previewImg) {
              previewWrap.style.display = 'none';
              previewImg.src = '';
            }
            return;
          }

          hasScreenshot = true;
          screenshotFileName = file.name || '';
          sessionStorage.setItem('mulive_screenshot_name', screenshotFileName);

          const reader = new FileReader();
          reader.onload = (ev) => {
            remitImageBase64 = ev.target.result || '';
            if (previewWrap && previewImg) {
              previewImg.src = remitImageBase64;
              previewWrap.style.display = 'block';
            }
          };
          reader.readAsDataURL(file);
        });
      }

      document.getElementById('next-1').addEventListener('click', () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const last5 = document.getElementById('last5').value.trim();
        const note = document.getElementById('note').value.trim();

        if (!name || !phone || !last5) {
          alert('請填寫姓名、電話與匯款後五碼 🙏');
          return;
        }
        if (!/^\d{5}$/.test(last5)) {
          alert('匯款帳號後五碼請輸入 5 位數字 🙏');
          return;
        }

        sessionStorage.setItem('mulive_name', name);
        sessionStorage.setItem('mulive_phone', phone);
        sessionStorage.setItem('mulive_last5', last5);
        sessionStorage.setItem('mulive_note', note || '');

        openConfirmModal();
      });

    // Step2
    } else if (currentStep === 2) {
      stepIndicator.textContent = `Step 2 / ${TOTAL_STEPS}`;
      stepCard.innerHTML = `
        <div class="step-title">選擇取貨方式</div>
        <div class="step-desc">請選擇你希望的取貨方式。</div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-pickup">巴拉冠自取</button>
          <button class="btn btn-ghost" id="btn-711">7-11 店到店</button>
        </div>
      `;

      // ✅ 巴拉冠自取：先送資料，再顯示完成畫面
      document.getElementById('btn-pickup').addEventListener('click', async () => {
        const orderData = buildOrderData('巴拉冠自取');
        showLoading('建立訂單中…');
        await sendOrderToSheet(orderData);

        clearCart();
        hideLoading();
        stepIndicator.textContent = '完成';
        stepCard.innerHTML = `
          <div class="step-title">訂購完成</div>
          <div class="success-text">
            感謝你的訂購！<br/>
            我們已收到你的訂單與匯款資訊，<br/>
            確認收到款項後會用簡訊通知！<br/>
            請耐心等待衣服的到來，<br/>
            巴拉冠自取相關時間，將再另外通知你。🌾
          </div>

          <div style="
            background:#f7f3ec;
            border:1px solid #e3ddcf;
            border-radius:14px;
            padding:16px;
            margin-top:20px;
            text-align:center;
            font-size:14px;
            line-height:1.7;
          ">
            <strong>加入 Mulivelivek 初鹿部落官方 LINE</strong><br>
            🔗 <strong>@576myfau</strong><br>
            <a href="https://lin.ee/vtlK2fuB" target="_blank"
               style="color:#c58543; font-weight:600; text-decoration:none;">
               https://lin.ee/vtlK2fuB
            </a><br>
            <span style="font-size:13px; color:#7b6d5a;">
              可接收最新消息及查帳通知
            </span>
          </div>
        `;
      });

      // ✅ 7-11：一樣先 await 送資料，再跳轉到 7-11 頁面
      document.getElementById('btn-711').addEventListener('click', async () => {
        const orderData = buildOrderData('7-11 店到店');
        showLoading('前往 7-11 取貨設定中…');
       await sendOrderToSheet(orderData);

        clearCart();
        window.location.href = 'https://myship.7-11.com.tw/cart/confirm/GM2511309292297';
      });
    }
  }

  // 彈窗按鈕
  const modalNoBtn  = document.getElementById("modal-no");
  const modalYesBtn = document.getElementById("modal-yes");

  if (modalNoBtn && modalYesBtn) {
    modalNoBtn.addEventListener("click", () => {
      closeConfirmModal();
    });

    modalYesBtn.addEventListener("click", () => {
      if (!hasScreenshot) {
        alert('請先完成匯款並上傳匯款截圖 🙏');
        return;
      }
      closeConfirmModal();
      currentStep = 2;
      renderStep();
    });
  }

  renderStep();
</script>
</body>
</html>
