<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>結帳｜Mulivelivek 初鹿部落</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root { --bg: #f7f3ec; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --accent-dark: #92572a; --text: #2f2415; --muted: #7b6d5c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    a { color: inherit; text-decoration: none; }

    /* 最上端灰色導覽列 */
    .site-header { position: sticky; top: 0; z-index: 50; background: #6c757d; border-bottom: 1px solid #5a6268; color: #fff; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: #fff; }
    .header-cart-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(0,0,0,0.2); font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .header-cart-count { min-width: 20px; height: 20px; border-radius: 999px; background: #c58543; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
    
    /* 表單樣式 */
    .wrap { max-width: 500px; margin: 40px auto; padding: 0 16px; width: 100%; }
    .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    h1 { font-size: 1.5rem; margin-top: 0; color: var(--accent-dark); }
    label { display: block; margin: 16px 0 6px; font-weight: 600; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #fffdf8; font-size: 1rem; }
    .btn-submit { width: 100%; padding: 16px; background: var(--text); color: #fff; border-radius: 99px; border: none; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 24px; transition: 0.2s; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">Mulivelivek 初鹿部落</a>
      <a href="cart.html" class="header-cart-pill">購物車 <span class="header-cart-count" id="headerCartCount">0</span></a>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <h1>確認結帳</h1>
      <form id="checkoutForm">
        <label>姓名</label><input type="text" id="name" required placeholder="請輸入姓名">
        <label>電話</label><input type="tel" id="phone" required placeholder="請輸入電話">
        <label>匯款帳號後五碼</label><input type="text" id="last5" required maxlength="5" placeholder="請輸入匯款後五碼">
        <label>取貨方式</label>
        <input type="text" value="巴拉冠自取" readonly style="background:#eee; color:#888;">
        
        <label>備註</label>
        <textarea id="note" rows="3" placeholder="有什麼想告訴我們的嗎？"></textarea>
        
        <button type="submit" class="btn-submit" id="submitBtn">確認送出訂單</button>
      </form>
    </div>
  </main>

  <script>
    const CART_KEY = 'mulivelivek_cart';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwtTn76uAXjMp5ZoakeNQpuLNqQ-AWpMkha9DYC3C80a3KfAQ7XPESKDpNH98t-CLjP/exec'; 

    // 初始化購物車數字
    const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
    document.getElementById('headerCartCount').textContent = cart.reduce((s, i) => s + (parseInt(i.qty) || 0), 0);

    // 表單送出
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '訂單處理中...';

      const itemsString = cart.map(i => `${i.name || '商品'}(${i.size || '無'})x${i.qty || 1}`).join('；');

      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        last5: document.getElementById('last5').value,
        items: itemsString,
        pickupMethod: '巴拉冠自取',
        note: document.getElementById('note').value
      };

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', // 確保跨域請求正確
          body: JSON.stringify(data)
        });
        alert('訂單已送出，感謝您的購買！');
        localStorage.removeItem(CART_KEY);
        window.location.href = 'index.html';
      } catch (err) {
        alert('送出失敗，請檢查網路連線。');
        btn.disabled = false; btn.textContent = '確認送出訂單';
      }
    });
  </script>
</body>
</html>
