<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>結帳｜Mulivelivek 初鹿部落</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { --bg: #f7f3ec; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --accent-dark: #92572a; --text: #2f2415; --muted: #7b6d5c; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    .site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    
    .wrap { max-width: 500px; margin: 40px auto; padding: 0 16px; }
    .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    h1 { font-size: 1.5rem; margin-top: 0; color: var(--accent-dark); }
    label { display: block; margin: 16px 0 6px; font-weight: 600; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #fffdf8; font-size: 1rem; }
    
    .ai-helper-btn { background: var(--accent); color: white; padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    
    .btn-submit { width: 100%; padding: 16px; background: var(--text); color: #fff; border-radius: 99px; border: none; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 24px; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">Mulivelivek 初鹿部落</a>
      <a href="cart.html">返回購物車</a>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <h1>確認結帳</h1>
      <form id="checkoutForm">
        <label>姓名</label><input type="text" id="name" required placeholder="請輸入姓名">
        <label>電話</label><input type="tel" id="phone" required placeholder="請輸入電話">
        <label>匯款帳號後五碼</label><input type="text" id="last5" required maxlength="5" placeholder="請輸入匯款後五碼">
        <label>取貨方式</label>
        <input type="text" value="巴拉冠自取" readonly style="background:#eee; color:#888;">
        
        <label>備註</label>
        <button type="button" class="ai-helper-btn" id="aiHelperBtn">✨ AI 幫我寫一句話</button>
        <textarea id="note" rows="2" placeholder="也可以在此處手寫備註"></textarea>
        
        <button type="submit" class="btn-submit" id="submitBtn">確認送出訂單</button>
      </form>
    </div>
  </main>

  <script>
    const CART_KEY = 'mulivelivek_cart';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwtTn76uAXjMp5ZoakeNQpuLNqQ-AWpMkha9DYC3C80a3KfAQ7XPESKDpNH98t-CLjP/exec'; 

    async function callGemini(prompt, retries = 3, delay = 1000) {
      const apiKey = ""; // API Key will be provided by environment
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
      
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "您是初鹿部落的親切小幫手。請幫顧客撰寫一句簡短、溫暖且充滿部落祝福的訂單備註，語氣要禮貌且親近。" }] }
          })
        });
        
        if (!response.ok) throw new Error('API Error');
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
      } catch (err) {
        if (retries > 0) {
          await new Promise(resolve => setTimeout(resolve, delay));
          return callGemini(prompt, retries - 1, delay * 2);
        }
        throw err;
      }
    }

    document.getElementById('aiHelperBtn').addEventListener('click', async () => {
      const btn = document.getElementById('aiHelperBtn');
      const noteArea = document.getElementById('note');
      
      btn.textContent = '撰寫中...';
      btn.disabled = true;
      
      try {
        const suggestion = await callGemini("請寫一句簡短的訂單祝福話語，包含對初鹿部落的喜愛。");
        noteArea.value = suggestion;
      } catch (e) {
        alert('抱歉，AI 暫時休息中，請手動輸入。');
      } finally {
        btn.textContent = '✨ AI 幫我寫一句話';
        btn.disabled = false;
      }
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '訂單處理中...';

      const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
      const itemsString = cart.map(i => `${i.name || '商品'}(${i.size || '無'})x${i.qty || 1}`).join('；');

      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        last5: document.getElementById('last5').value,
        items: itemsString,
        pickupMethod: '巴拉冠自取',
        note: document.getElementById('note').value
      };

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(data)
        });
        alert('訂單已送出，感謝您的購買！');
        localStorage.removeItem(CART_KEY);
        window.location.href = 'index.html';
      } catch (err) {
        alert('送出失敗，請檢查網路連接。');
        btn.disabled = false; btn.textContent = '確認送出訂單';
      }
    });
  </script>
</body>
</html>
