<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Mulivelivek 初鹿部落｜購物車</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root { --bg: #f7f3ec; --bg-soft: #fffdf8; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --accent-dark: #92572a; --text: #2f2415; --muted: #7b6d5c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column;}
    a { color: inherit; text-decoration: none; }

    /* 修正：導覽列改為適合亮色背景的深色文字 */
    .site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); color: var(--text); }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: radial-gradient(circle at 30% 20%, #f8e1b4, #c98c46); }
    .brand-text-main { font-size: 1.1rem; font-weight: 600; }
    .header-nav { display: flex; gap: 20px; font-size: 0.9rem; font-weight: 500; color: var(--muted); }
    .header-nav a:hover { color: var(--accent); }
    .header-cart-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: var(--bg-soft); font-size: 0.85rem; border: 1px solid var(--border); color: var(--text); }
    .header-cart-count { min-width: 20px; height: 20px; border-radius: 999px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }

    /* Cart Page Layout */
    .page { flex: 1; max-width: 900px; margin: 0 auto; padding: 30px 16px; width: 100%; }
    .page-title { font-size: 1.8rem; margin: 0 0 20px; font-weight: 700; color: var(--accent-dark); }
    .cart-shell { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px dashed var(--border); gap: 16px; }
    .btn-remove { border: none; background: #fffdf8; color: #c43c3c; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
    
    .btn { padding: 14px 28px; background: var(--accent); color: #fff; border-radius: 99px; border: none; font-weight: 600; cursor: pointer; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <!-- 修正：用 <a> 包住 Logo 讓它能點擊回首頁 -->
      <a href="index.html" class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text-main">Mulivelivek 初鹿部落</div>
      </a>
      <nav class="header-nav">
        <a href="index.html">首頁</a>
        <a href="products.html">所有商品</a>
        <a href="gallery.html">部落相簿</a>
        <a href="order-tracking.html">訂單查詢</a>
      </nav>
      <a href="cart.html" class="header-cart-pill">
        購物車 <span class="header-cart-count" id="headerCartCount">0</span>
      </a>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">您的購物車</h1>
    <div class="cart-shell">
      <div id="cartList"></div>
      <div class="actions">
        <a href="products.html" class="btn btn-outline">繼續購物</a>
        <div class="total-area">
          <div class="total-text">總計: <span id="cartTotal" style="color:var(--accent-dark);">NT$ 0</span></div>
          <a href="checkout.html" class="btn" id="checkoutBtn">下一步，前往結帳</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const CART_KEY = 'mulivelivek_cart';
    function render() {
      const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
      const list = document.getElementById('cartList');
      const totalEl = document.getElementById('cartTotal');
      const headerCount = document.getElementById('headerCartCount');
      
      let totalQty = 0, total = 0, html = '';
      
      cart.forEach((item, idx) => {
        const qty = parseInt(item.qty) || 1;
        const sub = (item.price || 0) * qty;
        total += sub;
        totalQty += qty;
        html += `
          <div class="cart-item">
            <div>${item.name || '商品'} (尺寸:${item.size || 'F'})</div>
            <div>NT$ ${sub}</div>
            <button class="btn-remove" onclick="removeItem(${idx})">×</button>
          </div>
        `;
      });
      list.innerHTML = html || '購物車是空的';
      totalEl.textContent = 'NT$ ' + total;
      headerCount.textContent = totalQty;
    }

    function removeItem(idx) {
      const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
      cart.splice(idx, 1);
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      render();
    }
    render();
  </script>
</body>
</html>
