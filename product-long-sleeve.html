<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>初鹿部落年祭限定水洗長袖｜Mulivelivek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root { --bg: #f7f3ec; --bg-soft: #fffdf8; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --accent-dark: #92572a; --text: #2f2415; --muted: #7b6d5c; --black: #111111; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

    /* RWD Header */
    .site-header { position: sticky; top: 0; z-index: 50; background: #ffffffee; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: radial-gradient(circle at 30% 20%, #f5d7a1, #c58b4a); }
    .brand-text-main { font-size: 1.1rem; font-weight: 600; }
    .header-nav { display: flex; gap: 20px; font-size: 0.9rem; font-weight: 500; color: var(--muted); }
    .header-nav a:hover { color: var(--accent); }
    .header-cart-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: var(--bg-soft); font-size: 0.85rem; border: 1px solid var(--border); }
    .header-cart-count { min-width: 20px; height: 20px; border-radius: 999px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
    @media (max-width: 768px) { .brand { flex: 1; } .header-nav { order: 3; width: 100%; justify-content: center; margin-top: 12px; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; } .header-cart-pill { margin-left: auto; } }

    /* Product Page */
    .page { max-width: 1100px; margin: 0 auto; padding: 30px 16px 60px; }
    .breadcrumb { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
    .product-shell { background: var(--card); border-radius: 20px; padding: 30px; display: grid; grid-template-columns: 1.3fr 1.1fr; gap: 40px; border: 1px solid var(--border); }
    
    @media (max-width: 800px) {
      .product-shell { grid-template-columns: 1fr; padding: 20px; gap: 24px; }
    }
    
    .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .image-box { background: #e5ded1; border-radius: 12px; position: relative; padding-top: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .image-box span { position: absolute; font-size: 0.9rem; color: #4c4032; text-align: center; }
    @media (max-width: 480px) { .image-grid { grid-template-columns: 1fr; } .image-box { padding-top: 80%; } }
    
    .info-panel { display: flex; flex-direction: column; gap: 16px; }
    .title-main { font-size: 1.8rem; font-weight: 700; margin: 0; line-height: 1.3; }
    .price { font-size: 1.3rem; font-weight: 700; color: var(--accent-dark); }
    
    .label { font-size: 0.9rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
    .size-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .size-btn { padding: 10px 18px; border: 1px solid var(--border); border-radius: 10px; background: #fff; cursor: pointer; font-size: 1rem; font-weight: 500; transition: 0.2s; }
    .size-btn.active { background: var(--black); color: #fff; border-color: var(--black); }
    
    .qty-row { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
    .qty-btn { width: 44px; height: 44px; background: #fffdf8; border: none; cursor: pointer; font-size: 1.2rem; }
    .qty-display { width: 50px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 600; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

    .btn-add { background: var(--black); color: #fff; width: 100%; padding: 16px; border-radius: 99px; font-weight: 600; font-size: 1.1rem; border: none; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .btn-add:hover { background: #333; }

    /* ✨ AI Styling (RWD) */
    .ai-styling-section { margin-top: 40px; padding: 24px; background: linear-gradient(135deg, #fffdf8, #f7f3ec); border: 1px dashed var(--accent); border-radius: 20px; }
    .ai-styling-title { font-size: 1.2rem; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
    .ai-styling-input-group { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .ai-style-input { flex: 1; min-width: 200px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; }
    .ai-style-input:focus { border-color: var(--accent); }
    .ai-style-btn { padding: 14px 24px; background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; white-space: nowrap; }
    @media (max-width: 600px) { .ai-styling-input-group { flex-direction: column; } .ai-style-btn { width: 100%; } }
    .ai-style-result { margin-top: 20px; font-size: 0.95rem; line-height: 1.6; background: #fff; padding: 16px; border-radius: 12px; border: 1px solid var(--border); display: none; }

    /* Mini Cart (RWD) */
    .mini-cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: flex-end; z-index: 100; padding: 16px; }
    @media (min-width: 600px) { .mini-cart-overlay { align-items: center; } }
    .mini-cart-panel { width: 100%; max-width: 400px; background: #fff; padding: 24px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .mini-cart-btn { display: block; width: 100%; text-align: center; padding: 14px; border-radius: 99px; margin-top: 12px; text-decoration: none; font-size: 1rem; font-weight: 600; border: 1px solid transparent; }
    .btn-checkout { background: var(--accent); color: #fff; }
    .btn-view { border-color: var(--border); color: var(--text); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand"><a href="index.html" style="display:flex; align-items:center; gap:10px;"><div class="brand-mark"></div><div class="brand-text-main">Mulivelivek</div></a></div>
      <nav class="header-nav"><a href="index.html">首頁</a><a href="products.html">所有商品</a><a href="gallery.html">部落相簿</a><a href="order-tracking.html">訂單查詢</a></nav>
      <a href="cart.html" class="header-cart-pill">購物車 <span class="header-cart-count" id="headerCartCount">0</span></a>
    </div>
  </header>

  <main class="page">
    <div class="breadcrumb"><a href="index.html">首頁</a> / <a href="products.html">所有商品</a> / <span>限定提袋</span></div>
    
    <section class="product-shell">
      <div class="image-grid">
        <div class="image-box"><span>正面預覽</span></div>
        <div class="image-box"><span>背面預覽</span></div>
      </div>
      <div class="info-panel">
        <h1 class="title-main">初鹿部落收穫祭限定提袋</h1>
        <div class="price">NT$ 200</div>
        <p style="color:var(--muted); font-size:0.95rem; line-height:1.6; margin:0;">我們以 「花裙sukun」 為主軸推出限定款式</p>
        
        <div>
          <div class="label">尺寸</div>
          <div class="size-row">
            <button class="size-btn active" onclick="setSize(this, 'M')">M</button>
            <button class="size-btn" onclick="setSize(this, 'L')">L</button>
            <button class="size-btn" onclick="setSize(this, 'XL')">XL</button>
            <button class="size-btn" onclick="setSize(this, '2XL')">2XL</button>
          </div>
        </div>

        <div>
          <div class="label">數量</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="updateQty(-1)">−</button>
            <div class="qty-display" id="qtyDisplay">1</div>
            <button class="qty-btn" onclick="updateQty(1)">＋</button>
          </div>
        </div>

        <button class="btn-add" id="addToCartBtn">加入購物車</button>
      </div>
    </section>
    
  <div class="mini-cart-overlay" id="miniCart">
    <div class="mini-cart-panel">
      <h2 style="margin-top:0; font-size:1.3rem;">已加入購物車 ✔️</h2>
      <p style="font-size:1rem; color:var(--muted); margin-bottom:20px;">初鹿部落年祭限定水洗長袖 <br><strong style="color:var(--text)" id="miniSize"></strong></p>
      <a href="shipping.html" class="mini-cart-btn btn-checkout">快速結帳</a>
      <a href="cart.html" class="mini-cart-btn btn-view">查看購物車細節</a>
      <button style="width:100%; background:none; border:none; padding:16px; margin-top:8px; color:var(--muted); font-size:0.95rem; cursor:pointer; text-decoration:underline;" onclick="document.getElementById('miniCart').style.display='none'">繼續購物</button>
    </div>
  </div>

  <script>
    let currentSize = 'M', qty = 1;
    function setSize(btn, size) { document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentSize = size; }
    function updateQty(n) { if(qty + n > 0) { qty += n; document.getElementById('qtyDisplay').textContent = qty; } }
    function loadCart() { try { return JSON.parse(localStorage.getItem('mulivelivekCart') || '[]'); } catch { return []; } }
    function saveCart(c) { localStorage.setItem('mulivelivekCart', JSON.stringify(c)); document.getElementById('headerCartCount').textContent = c.reduce((s,i)=>s+(i.quantity||0),0); }
    
    document.getElementById('addToCartBtn').addEventListener('click', () => {
      const cart = loadCart();
      cart.push({ style: '年祭限定水洗長袖', size: currentSize, quantity: qty, price: 450 });
      saveCart(cart);
      document.getElementById('miniSize').textContent = `(尺寸: ${currentSize} / 數量: ${qty})`;
      document.getElementById('miniCart').style.display = 'flex';
    });
    saveCart(loadCart()); // Init header

    const styleBtn = document.getElementById('styleBtn'), styleInput = document.getElementById('styleInput'), styleResult = document.getElementById('styleResult');
    styleBtn.addEventListener('click', async () => {
      const occasion = styleInput.value.trim(); if(!occasion) return;
      styleBtn.textContent = '思考中...'; styleBtn.disabled = true; styleResult.style.display = 'block'; styleResult.textContent = '✨ AI 正在為您構思穿搭...';
      try {
        const apiKey = ""; 
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `我有一件「淺灰水洗寬版 Oversized」的長袖上衣。要去「${occasion}」。請給出具體且帥氣的穿搭建議（含褲子、鞋子、配件），限 100 字內。` }] }] })
        });
        const data = await res.json();
        styleResult.innerHTML = data.candidates?.[0]?.content?.parts?.[0]?.text.replace(/\n/g, '<br>') || "抱歉，暫時無法提供建議。";
      } catch (e) { styleResult.textContent = "發生錯誤，請檢查網路。"; } 
      finally { styleBtn.textContent = '獲得專屬建議'; styleBtn.disabled = false; }
    });
  </script>
</body>
</html>
