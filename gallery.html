<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Mulivelivek 初鹿部落｜部落映像</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root { --bg: #f7f3ec; --card: #ffffff; --border: #e3ddcf; --accent: #c58543; --text: #2f2415; --muted: #7b6d5c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }

 /* 導覽列通用樣式 */
.site-header { position: sticky; top: 0; z-index: 50; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff; }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); background: radial-gradient(circle at 30% 20%, #f8e1b4, #c98c46); }
.brand-text-main { font-size: 1.1rem; font-weight: 600; color: #fff; }
.brand-text-sub { font-size: 0.75rem; color: #f5e3bf; letter-spacing: 0.1em; text-transform: uppercase; }
.header-nav { display: flex; gap: 20px; font-size: 0.9rem; font-weight: 500; }
.header-nav a { color: #fff; text-decoration: none; }
.header-nav a:hover { color: #f5e3bf; }
.header-cart-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(0,0,0,0.4); font-size: 0.85rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; color: #fff; }
.header-cart-pill:hover { background: rgba(0,0,0,0.6); }
.header-cart-count { min-width: 20px; height: 20px; border-radius: 999px; background: #c58543; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }

@media (max-width: 768px) {
  .header-inner { padding: 10px 16px; }
  .brand { flex: 1; }
  .header-nav { order: 3; width: 100%; justify-content: center; margin-top: 12px; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; }
  .header-cart-pill { margin-left: auto; }
}
    /* Gallery Page */
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 16px; }
    .gallery-header { text-align: center; margin-bottom: 40px; }
    .page-title { font-size: 1.8rem; font-weight: 700; margin: 0 0 10px; color: #92572a; }
    .page-sub { font-size: 0.95rem; color: var(--muted); max-width: 600px; margin: 0 auto; line-height: 1.6; }

    /* Masonry Grid (RWD) */
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; grid-auto-rows: 240px; grid-auto-flow: dense; }
    .photo-item { position: relative; background: #e5ded1; border-radius: 16px; overflow: hidden; cursor: pointer; transition: 0.3s; }
    .photo-item:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .photo-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .photo-item:hover .photo-img { transform: scale(1.05); }
    
    .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: #fff; }
    .photo-item:hover .photo-overlay { opacity: 1; }
    .photo-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .photo-desc { font-size: 0.85rem; opacity: 0.9; }

    .photo-item.wide { grid-column: span 2; }
    .photo-item.tall { grid-row: span 2; }
    .photo-item.big { grid-column: span 2; grid-row: span 2; }

    @media (max-width: 800px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .photo-item.wide, .photo-item.big { grid-column: span 2; }
    }
    @media (max-width: 500px) {
      .gallery-grid { grid-template-columns: 1fr; grid-auto-rows: auto; gap: 12px; }
      .photo-item { aspect-ratio: 4/3; grid-column: auto !important; grid-row: auto !important; border-radius: 12px; }
      /* 手機上自動顯示一點漸層，確保文字可讀 (不需 Hover) */
      .photo-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <div class="brand-text-main">Mulivelivek 初鹿部落</div>
        <div class="brand-text-sub">'inavayan</div>
      </div>
    </div>
    <nav class="header-nav">
      <a href="index.html">首頁</a>
      <a href="products.html">所有商品</a>
      <a href="gallery.html">部落相簿</a>
      <a href="order-tracking.html">訂單查詢</a>
    </nav>
    <a href="cart.html" class="header-cart-pill">
      購物車 <span class="header-cart-count" id="headerCartCount">0</span>
    </a>
  </div>
</header>

  <main class="page">
    <div class="gallery-header">
      <h1 class="page-title">部落映像 Gallery</h1>
      <p class="page-sub">收錄了年祭的震撼、田裡的汗水，以及部落裡那些平凡卻閃閃發光的時刻。</p>
    </div>

    <div class="gallery-grid">
      <div class="photo-item wide">
        <img src="https://images.unsplash.com/photo-1533228876829-65c94e7b5025?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" class="photo-img">
        <div class="photo-overlay"><div class="photo-title">年祭廣場</div><div class="photo-desc">2024 / 族人齊聚的一刻</div></div>
      </div>
      <div class="photo-item tall">
        <img src="https://images.unsplash.com/photo-1517260739337-6799d2eb9ce0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="photo-img">
        <div class="photo-overlay"><div class="photo-title">盛裝與傳承</div><div class="photo-desc">傳統服飾細節</div></div>
      </div>
      <div class="photo-item">
        <img src="https://images.unsplash.com/photo-1621682372775-533449e5502d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="photo-img">
        <div class="photo-overlay"><div class="photo-title">部落的風</div><div class="photo-desc">初鹿田野風光</div></div>
      </div>
      <div class="photo-item">
        <img src="https://images.unsplash.com/photo-1618212624319-35e670989e49?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="photo-img">
        <div class="photo-overlay"><div class="photo-title">老人家的手</div><div class="photo-desc">編織記憶</div></div>
      </div>
      <div class="photo-item big">
        <img src="https://images.unsplash.com/photo-1542382156-9d32d4310cb2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" class="photo-img">
        <div class="photo-overlay"><div class="photo-title">跨越世代</div><div class="photo-desc">溫暖的牽繫</div></div>
      </div>
    </div>
  </main>
</body>
</html>
